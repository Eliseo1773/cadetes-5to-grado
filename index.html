<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>🛡️ DEFENSA CELULAR - MODO PURO</title>
<style>
/* --- ESTILOS LIMPIOS Y RÁPIDOS --- */
*{margin:0;padding:0;box-sizing:border-box;touch-action:none;user-select:none;-webkit-user-select:none;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:sans-serif;position:fixed;}

#bg{position:fixed;inset:0;z-index:0;background:radial-gradient(circle, #200 0%, #000 100%);}
.cell-bg{position:absolute;background:rgba(255,50,50,0.08);border-radius:50%;pointer-events:none;}

.screen{position:fixed;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:200;padding:20px;background:rgba(0,0,0,0.95);}
h1{font-size:2em;color:#ff4d4d;text-align:center;margin-bottom:20px;text-shadow:0 0 10px #f00;}

.start-btn{background:#ff4d4d;color:#fff;border:none;padding:18px 45px;font-size:1.3em;font-weight:bold;cursor:pointer;border-radius:50px;box-shadow:0 0 20px #f00;}

#gameArea{position:fixed;inset:0;display:none;z-index:10;}
#hud{position:fixed;top:0;left:0;right:0;height:50px;display:flex;justify-content:space-between;align-items:center;color:#ff4d4d;font-size:0.9em;z-index:50;background:rgba(0,0,0,0.8);padding:0 15px;border-bottom:2px solid #f00;font-weight:bold;}

#player{position:fixed;font-size:2.8em;z-index:20;transform:translateX(-50%);bottom:140px;}
.shot{position:fixed;width:5px;height:18px;background:#fff;border-radius:3px;box-shadow:0 0 10px #0af;}
.enemy-shot{position:fixed;width:4px;height:12px;background:#0f0;}
.enemy{position:fixed;font-size:1.8em;z-index:5;width:35px;height:35px;display:flex;align-items:center;justify-content:center;}

/* CONTROLES INVERTIDOS: Disparo Izquierda, Flechas Derecha */
#mobileControls{position:fixed;bottom:30px;left:0;right:0;display:flex;justify-content:space-between;padding:0 25px;z-index:300;}
#fireBtn{width:95px;height:95px;background:rgba(0,150,255,0.3);border:4px solid #0af;border-radius:50%;color:#0af;font-size:2.2em;display:flex;justify-content:center;align-items:center;}
.arrows{display:flex;gap:15px;}
.arrow-btn{width:80px;height:80px;background:rgba(255,255,255,0.1);border:3px solid #fff;border-radius:15px;color:#fff;font-size:2.2em;display:flex;justify-content:center;align-items:center;}

@media(min-width:769px){#mobileControls{display:none;} #player{bottom:50px;}}
</style>
</head>
<body>

<div id="bg"></div>

<div id="startScreen" class="screen">
    <h1>🛡️ SISTEMA INMUNE</h1>
    <p style="color:#fff; margin-bottom:30px; text-align:center;">Elimina los virus antes de que se propaguen.</p>
    <button class="start-btn" id="startBtn">COMENZAR</button>
</div>

<div id="gameArea">
    <div id="hud">
        <div id="lives">SALUD: ❤️❤️❤️</div>
        <div id="score">PUNTOS: 0</div>
        <div id="levelInd">NIVEL 1</div>
    </div>
    <div id="player">🛡️</div>
    <div id="mobileControls">
        <div id="fireBtn">⚡</div>
        <div class="arrows">
            <div class="arrow-btn" id="leftBtn">◀</div>
            <div class="arrow-btn" id="rightBtn">▶</div>
        </div>
    </div>
</div>

<div id="endScreen" class="screen" style="display:none;">
    <h2 id="endTitle" style="color:#f44; font-size:2em; margin-bottom:15px;">FIN DEL JUEGO</h2>
    <h1 id="finalScore" style="color:#fff; margin-bottom:20px;">0</h1>
    <button class="start-btn" onclick="location.reload()">REINTENTAR 🔄</button>
</div>

<script>
/* --- SONIDOS SINTETIZADOS (SIN ARCHIVOS EXTERNOS) --- */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSfx(f, t, d, v=0.1) {
    try {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
        g.gain.setValueAtTime(v, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + d);
    } catch(e) {}
}

const $ = id => document.getElementById(id);
let G = { playing: false, lvl: 1, score: 0, lives: 3, px: 50, enemies: [], shots: [], eShots: [], session: 0, loopId: null };

// Decoración de fondo
for(let i=0; i<20; i++) {
    const c = document.createElement('div');
    c.className = 'cell-bg';
    c.style.left = Math.random()*100+'%';
    c.style.top = Math.random()*100+'%';
    let s = Math.random()*60+30;
    c.style.width = c.style.height = s+'px';
    $('bg').appendChild(c);
}

function initLevel() {
    G.playing = false;
    G.session++;
    if(G.loopId) cancelAnimationFrame(G.loopId);

    const currentS = G.session;
    G.enemies = []; G.shots = []; G.eShots = [];
    document.querySelectorAll('.enemy, .shot, .enemy-shot').forEach(e => e.remove());

    $('startScreen').style.display = 'none';
    $('endScreen').style.display = 'none';
    $('gameArea').style.display = 'block';
    $('levelInd').textContent = `NIVEL ${G.lvl}`;

    // FÓRMULA DE ENEMIGOS: Crece poco a poco
    const rows = 3 + Math.min(Math.floor(G.lvl / 4), 3);
    const cols = 5 + Math.min(Math.floor(G.lvl / 2), 5);
    const startX = (window.innerWidth - (cols * 45)) / 2;

    for(let r=0; r<rows; r++) {
        for(let c=0; c<cols; c++) {
            const el = document.createElement('div');
            el.className = 'enemy';
            el.innerHTML = (r%2==0) ? '🦠' : '👾';
            let x = startX + (c * 45);
            let y = 70 + (r * 45);
            el.style.left = x+'px'; el.style.top = y+'px';
            $('gameArea').appendChild(el);
            G.enemies.push({el, x, y});
        }
    }

    let lastT = performance.now();
    function main(t) {
        if(G.session !== currentS || !G.playing) return;
        let dt = Math.min((t - lastT) / 1000, 0.1);
        lastT = t;
        update(dt);
        G.loopId = requestAnimationFrame(main);
    }
    G.playing = true;
    G.loopId = requestAnimationFrame(main);
}

let mL = false, mR = false, dir = 1;

function update(dt) {
    // MOVIMIENTO JUGADOR (Aumentado a 320 para mejor respuesta)
    if(mL) G.px -= (320 / window.innerWidth * 100) * dt;
    if(mR) G.px += (320 / window.innerWidth * 100) * dt;
    G.px = Math.max(6, Math.min(94, G.px));
    $('player').style.left = G.px+'%';

    // MOVIMIENTO ENEMIGOS (Velocidad lineal segura)
    let edge = false;
    const speed = 50 + (G.lvl * 8); // Crecimiento suave
    G.enemies.forEach(e => {
        e.x += speed * dir * dt;
        e.el.style.left = e.x+'px';
        if(e.x > window.innerWidth - 40 || e.x < 10) edge = true;
    });

    if(edge) {
        dir *= -1;
        G.enemies.forEach(e => {
            e.y += 20;
            e.el.style.top = e.y+'px';
            if(e.y > window.innerHeight - 190) endGame();
        });
    }

    // DISPAROS JUGADOR
    for(let i=G.shots.length-1; i>=0; i--) {
        const s = G.shots[i];
        s.y -= 500 * dt;
        s.el.style.top = s.y+'px';

        G.enemies.forEach((e, ei) => {
            if(s.x > e.x && s.x < e.x+35 && s.y > e.y && s.y < e.y+35) {
                playSfx(200, 'sawtooth', 0.1);
                e.el.remove(); G.enemies.splice(ei, 1);
                s.el.remove(); G.shots.splice(i, 1);
                G.score += 50;
                $('score').textContent = `PUNTOS: ${G.score}`;
                if(G.enemies.length === 0) { G.lvl++; initLevel(); }
            }
        });
        if(s.y < 0) { s.el.remove(); G.shots.splice(i, 1); }
    }

    // DISPAROS ENEMIGOS
    if(Math.random() < (0.002 + G.lvl * 0.0005)) {
        const e = G.enemies[Math.floor(Math.random()*G.enemies.length)];
        if(e) {
            const el = document.createElement('div');
            el.className = 'enemy-shot';
            el.style.left = (e.x+15)+'px'; el.style.top = (e.y+20)+'px';
            $('gameArea').appendChild(el);
            G.eShots.push({el, x: e.x+15, y: e.y+20});
        }
    }

    for(let i=G.eShots.length-1; i>=0; i--) {
        const s = G.eShots[i];
        s.y += 250 * dt;
        s.el.style.top = s.y+'px';
        let p = $('player').getBoundingClientRect();
        if(s.x > p.left && s.x < p.right && s.y > p.top && s.y < p.bottom) {
            playSfx(100, 'square', 0.2);
            s.el.remove(); G.eShots.splice(i, 1);
            G.lives--;
            $('lives').textContent = `SALUD: ${'❤️'.repeat(Math.max(0,G.lives))}`;
            if(G.lives <= 0) endGame();
        }
        if(s.y > window.innerHeight) { s.el.remove(); G.eShots.splice(i, 1); }
    }
}

function shoot() {
    if(!G.playing || G.shots.length > 3) return;
    playSfx(600, 'sine', 0.1);
    const p = $('player').getBoundingClientRect();
    const el = document.createElement('div');
    el.className = 'shot';
    let x = p.left + p.width/2; let y = p.top;
    el.style.left = x+'px'; el.style.top = y+'px';
    $('gameArea').appendChild(el);
    G.shots.push({el, x, y});
}

function endGame() {
    G.playing = false;
    $('gameArea').style.display = 'none';
    $('endScreen').style.display = 'flex';
    $('finalScore').textContent = `PUNTOS: ${G.score}`;
}

// CONTROLES
const startAction = (id, fn) => {
    $(id).addEventListener('touchstart', e => { e.preventDefault(); audioCtx.resume(); fn(); });
};
const bindBtn = (id, start, end) => {
    $(id).addEventListener('touchstart', e => { e.preventDefault(); audioCtx.resume(); start(); });
    $(id).addEventListener('touchend', e => { e.preventDefault(); end(); });
};

bindBtn('leftBtn', () => mL = true, () => mL = false);
bindBtn('rightBtn', () => mR = true, () => mR = false);
startAction('fireBtn', shoot);
$('startBtn').onclick = () => { audioCtx.resume(); initLevel(); };

window.onkeydown = e => {
    if(e.key==='ArrowLeft') mL=true; if(e.key==='ArrowRight') mR=true; if(e.key===' ') shoot();
};
window.onkeyup = e => {
    if(e.key==='ArrowLeft') mL=false; if(e.key==='ArrowRight') mR=false;
};
</script>
</body>
</html>
