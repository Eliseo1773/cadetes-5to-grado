<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>GALAGA — Eliseo Espinoza</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{background:#000010;display:flex;flex-direction:column;align-items:center;
       justify-content:flex-start;min-height:100vh;font-family:monospace;
       overflow-y:auto;overflow-x:hidden;touch-action:manipulation;}
  #wrap{display:flex;flex-direction:column;align-items:center;
        justify-content:center;min-height:100vh;width:100%;padding:8px 0;}
  canvas{display:block;border:2px solid #223;max-width:100vw;}
  #ui{color:#44ffaa;text-align:center;padding:12px 16px;}
  #ui h1{font-size:clamp(28px,8vw,46px);color:#ffcc00;letter-spacing:4px;
          text-shadow:0 0 20px #ffaa00;margin-bottom:4px;}
  #ui .sub{color:#88ffee;font-size:clamp(12px,3vw,16px);margin-bottom:4px;}
  #ui .dev{color:#ff8855;font-size:clamp(11px,2.5vw,14px);margin:6px 0 10px;}
  #teamsel{display:flex;gap:18px;justify-content:center;margin:14px 0 10px;}
  .tmbtn{padding:12px 28px;font-size:clamp(14px,4vw,20px);border:3px solid;
         border-radius:10px;cursor:pointer;font-weight:bold;letter-spacing:3px;
         font-family:monospace;transition:transform 0.1s,box-shadow 0.1s;background:#0a0a1a;}
  .tmbtn:active{transform:scale(0.95);}
  .tmbtn.t29{color:#44aaff;border-color:#44aaff;box-shadow:0 0 16px #44aaff55;}
  .tmbtn.t29:hover,.tmbtn.t29.sel{background:#44aaff22;box-shadow:0 0 28px #44aaffaa;}
  .tmbtn.t559{color:#ff6644;border-color:#ff6644;box-shadow:0 0 16px #ff664455;}
  .tmbtn.t559:hover,.tmbtn.t559.sel{background:#ff664422;box-shadow:0 0 28px #ff6644aa;}
  #ui .ctrl{color:#778;font-size:clamp(10px,2.2vw,13px);line-height:2;margin-bottom:16px;}
  #ui .ctrl span{color:#aaffee;}
  #ui .ctrl .tip{color:#ffcc44;}
  #ui .ctrl .tip2{color:#88ffff;}
  #ui .ctrl .tip3{color:#ffaaff;}
  #btn{padding:14px 40px;font-size:clamp(14px,4vw,18px);background:#ffcc00;border:none;
       border-radius:8px;cursor:pointer;font-weight:bold;letter-spacing:2px;
       box-shadow:0 0 24px #ffaa00;font-family:monospace;margin-top:4px;}
  #btn:active{transform:scale(0.96);}
  #btns{display:none;flex-direction:row;align-items:center;
        justify-content:space-between;width:100%;max-width:480px;
        padding:8px 12px;gap:8px;margin-top:6px;}
  .cbtn{padding:14px 0;font-size:clamp(18px,5vw,22px);background:#0a0a1a;color:#aaffee;
        border:1px solid #336;border-radius:12px;cursor:pointer;
        font-family:monospace;-webkit-user-select:none;user-select:none;
        flex:1;text-align:center;touch-action:none;}
  .cbtn:active{background:#1a1a3a;}
  #bf{background:#1a0a00;color:#ff8822;border-color:#662;font-size:clamp(20px,6vw,26px);}
</style>
</head>
<body>
<div id="wrap">
<canvas id="c"></canvas>
<div id="ui">
  <h1>🚀 GALAGA</h1>
  <div class="sub">Arcade Clásico</div>
  <div class="dev">Desarrollado por <b>Eliseo Espinoza</b></div>
  <div style="color:#ffaaff;font-size:clamp(12px,3vw,15px);margin-bottom:10px;">⚡ Elige tu equipo:</div>
  <div id="teamsel">
    <button class="tmbtn t29" id="btn29">EQUIPO 29</button>
    <button class="tmbtn t559" id="btn559">EQUIPO 559</button>
  </div>
  <div class="ctrl">
    <span>← → / A D</span> → Mover &nbsp;|&nbsp; <span>ESPACIO / ↑</span> → Disparar<br/>
    <span class="tip">★ Recoge la estrella para nave doble</span><br/>
    <span class="tip2">⚠ ¡Esquiva el tractor beam del boss!</span><br/>
    <span class="tip3">⚡ ¡El RAYO de 1°A te da superpoder temporal!</span>
  </div>
  <button id="btn">▶ INSERT COIN</button>
</div>
<div id="btns">
  <button class="cbtn" id="bl">◀</button>
  <button class="cbtn" id="br">▶</button>
  <button class="cbtn" id="bf">🔥</button>
</div>
</div>

<script>
const W=480,H=640,PW=36,PH=28,EW=32,EH=28;
const COLS=10,ROWS=4,GX=44,GY=42;
const OX=(W-COLS*GX)/2+6,OY=70;
const COLORS=["#ff4466","#ff8800","#ffcc00","#44ffaa"];
const STAR_COUNT=70;

// ── Equipos ──────────────────────────────────────────────
const TEAMS={
  "29":{name:"EQUIPO 29",color:"#44aaff",shipColor:"#44aaff",accent:"#aadeFF",label:"29"},
  "559":{name:"EQUIPO 559",color:"#ff6644",shipColor:"#ff6644",accent:"#ffaa88",label:"559"}
};
let selectedTeam="29";

const ui=document.getElementById("ui");
const btns=document.getElementById("btns");
document.getElementById("btn29").onclick=()=>{
  selectedTeam="29";
  document.getElementById("btn29").classList.add("sel");
  document.getElementById("btn559").classList.remove("sel");
};
document.getElementById("btn559").onclick=()=>{
  selectedTeam="559";
  document.getElementById("btn559").classList.add("sel");
  document.getElementById("btn29").classList.remove("sel");
};
// default sel
document.getElementById("btn29").classList.add("sel");

// ── Audio ─────────────────────────────────────────────────
function makeAudio(){
  try{
    const actx=new(window.AudioContext||window.webkitAudioContext)();
    function beep(freq,dur,type="square",vol=0.15,detune=0){
      const o=actx.createOscillator(),g=actx.createGain();
      o.type=type;o.frequency.value=freq;o.detune.value=detune;
      g.gain.setValueAtTime(vol,actx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+dur);
      o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+dur);
    }
    function lightning(){
      // sonido épico de rayo
      [800,600,1200,400,1000].forEach((f,i)=>setTimeout(()=>beep(f,0.1,"sawtooth",0.25),i*40));
      setTimeout(()=>beep(200,0.4,"sawtooth",0.3),200);
    }
    const melody=[
      [392,0.12],[440,0.12],[494,0.12],[523,0.18],[0,0.06],
      [494,0.12],[440,0.12],[392,0.18],[0,0.06],
      [330,0.12],[370,0.12],[392,0.18],[0,0.06],
      [330,0.12],[294,0.12],[262,0.24],[0,0.12],
      [523,0.12],[494,0.12],[440,0.12],[392,0.18],[0,0.06],
      [440,0.12],[494,0.12],[523,0.18],[0,0.06],
      [587,0.12],[523,0.12],[494,0.12],[440,0.24],[0,0.12],
    ];
    let bgRunning=false,bgTimeout=null;
    function playBg(){
      if(!bgRunning)return;
      let t=actx.currentTime;
      melody.forEach(([freq,dur])=>{
        if(freq>0){
          const o=actx.createOscillator(),g=actx.createGain();
          o.type="square";o.frequency.value=freq;
          g.gain.setValueAtTime(0.06,t);
          g.gain.exponentialRampToValueAtTime(0.001,t+dur*0.9);
          o.connect(g);g.connect(actx.destination);
          o.start(t);o.stop(t+dur);
        }
        t+=dur;
      });
      const total=melody.reduce((s,[,d])=>s+d,0);
      bgTimeout=setTimeout(playBg,total*1000+50);
    }
    function startBg(){if(bgRunning)return;bgRunning=true;if(actx.state==="suspended")actx.resume().then(playBg);else playBg();}
    function stopBg(){bgRunning=false;clearTimeout(bgTimeout);}
    return{
      shoot:()=>beep(880,0.08,"square",0.12),
      explode:()=>{beep(120,0.3,"sawtooth",0.2);beep(80,0.4,"sawtooth",0.15,20);},
      capture:()=>[440,330,220,150].forEach((f,i)=>setTimeout(()=>beep(f,0.18,"sine",0.2),i*120)),
      rescue:()=>[300,500,700,900].forEach((f,i)=>setTimeout(()=>beep(f,0.15,"sine",0.25),i*80)),
      powerup:()=>[400,600,800,1000,1200].forEach((f,i)=>setTimeout(()=>beep(f,0.12,"triangle",0.2),i*60)),
      lightning,
      stage:()=>[261,329,392,523].forEach((f,i)=>setTimeout(()=>beep(f,0.2,"sine",0.25),i*100)),
      hit:()=>beep(200,0.15,"sawtooth",0.18),
      resume:()=>{if(actx.state==="suspended")actx.resume();},
      startBg,stopBg
    };
  }catch(e){const n=()=>{};return{shoot:n,explode:n,capture:n,rescue:n,powerup:n,lightning:n,stage:n,hit:n,resume:n,startBg:n,stopBg:n};}
}

const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");
canvas.width=W;canvas.height=H;

let phase="start",hiScore=0,raf=null,last=0;
const keys={};
const audio=makeAudio();

function entryPath(col,row){
  const tx=OX+col*GX,ty=OY+row*GY;
  const side=col<COLS/2?-1:1;
  return[{x:W/2+side*220,y:-40},{x:W/2+side*180,y:80},
         {x:W/2+side*80,y:140},{x:tx+EW/2,y:ty+EH/2}];
}
function pathPos(path,t){
  const seg=(path.length-1)*t,i=Math.min(Math.floor(seg),path.length-2),f=seg-i;
  return{x:path[i].x+(path[i+1].x-path[i].x)*f,y:path[i].y+(path[i+1].y-path[i].y)*f};
}

const PATTERNS=[
  Array.from({length:20},(_,i)=>({x:i%2===0?-50:W+50,y:50+i*28,vx:i%2===0?3.5:-3.5,vy:0.5})),
  Array.from({length:16},(_,i)=>({x:W/2+(i-8)*40,y:-30-Math.abs(i-8)*20,vx:0,vy:2.5})),
  Array.from({length:18},(_,i)=>({x:-50,y:100+i*22,vx:2.8+i*0.08,vy:0.3})),
];

function makeEnemies(){
  const arr=[];
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)
    arr.push({id:r*COLS+c,col:c,row:r,alive:false,entering:true,
      entryPath:entryPath(c,r),entryT:0,
      entryDelay:(r*COLS+c)*4+(r%2===0?0:COLS*2),
      diving:false,ox:0,oy:0,dx:0,dy:0,angle:0,captured:false});
  return arr;
}

function initState(level=1){
  return{
    team:selectedTeam,
    px:W/2-PW/2,py:H-65,dual:false,
    bullets:[],eBullets:[],enemies:makeEnemies(),entryDone:false,
    stars:Array.from({length:STAR_COUNT},()=>({x:Math.random()*W,y:Math.random()*H,
      s:Math.random()*1.5+0.5,sp:Math.random()*0.8+0.3})),
    score:0,lives:3,shootCool:0,eCool:0,formDir:1,formX:0,
    diveTimer:80,frame:0,flash:0,invincible:0,level,
    captureState:null,capturedEnemy:null,captureBeam:0,
    captureCooldown:0,capturedShipX:0,capturedShipY:0,
    challenging:false,challengeLabel:0,challengeEnemies:[],
    powerUp:null,
    // ⚡ Rayo 1°A
    lightningPower:false,lightningTimer:0,lightningFX:0,
    lightningPickup:null,lightningSpawnTimer:400,
    lightningFlash:0,
  };
}

let S=null;

function ePos(e){
  if(e.entering){const p=pathPos(e.entryPath,Math.min(e.entryT,1));return{x:p.x-EW/2,y:p.y-EH/2};}
  if(e.diving)return{x:e.ox,y:e.oy};
  return{x:OX+e.col*GX+S.formX,y:OY+e.row*GY};
}

// ── LOOP ─────────────────────────────────────────────────
function loop(ts){
  if(!last)last=ts;
  const dt=Math.min((ts-last)/16.67,3);
  last=ts;
  const s=S;
  s.frame++;

  const tc=TEAMS[s.team];

  // entry
  if(!s.entryDone){
    s.enemies.forEach(e=>{
      if(!e.entering)return;
      e.entryDelay=Math.max(0,e.entryDelay-dt);
      if(e.entryDelay>0)return;
      e.entryT+=0.012*dt;
      if(e.entryT>=1){e.entering=false;e.alive=true;e.entryT=1;}
    });
    if(s.enemies.every(e=>!e.entering))s.entryDone=true;
  }

  // challenging
  const liveEn=s.enemies.filter(e=>e.alive&&!e.captured);
  if(s.entryDone&&!s.challenging&&liveEn.length===0&&s.challengeLabel===0){
    s.challenging=true;s.challengeLabel=180;
    s.challengeEnemies=PATTERNS[s.level%PATTERNS.length].map((p,i)=>({...p,alive:true,id:1000+i}));
    audio.stage();
  }
  if(s.challengeLabel>0)s.challengeLabel=Math.max(0,s.challengeLabel-dt);
  if(s.challenging){
    s.challengeEnemies.forEach(e=>{if(!e.alive)return;e.x+=e.vx*dt;e.y+=e.vy*dt;});
    s.challengeEnemies=s.challengeEnemies.filter(e=>e.alive&&e.x>-60&&e.x<W+60&&e.y<H+60);
    if(s.challengeEnemies.length===0){
      s.challenging=false;s.score+=1000;
      s.enemies=makeEnemies();s.entryDone=false;s.level++;s.formX=0;s.diveTimer=60;
      audio.stage();
    }
  }

  // stars
  s.stars.forEach(st=>{st.y+=st.sp*dt;if(st.y>H){st.y=0;st.x=Math.random()*W;}});

  // ⚡ Lightning power spawn
  s.lightningSpawnTimer=Math.max(0,s.lightningSpawnTimer-dt);
  if(s.lightningSpawnTimer<=0&&!s.lightningPickup&&!s.lightningPower){
    s.lightningPickup={x:Math.random()*(W-40)+20,y:-20,vy:1.2};
    s.lightningSpawnTimer=500+Math.random()*300;
  }
  if(s.lightningPickup){
    s.lightningPickup.y+=s.lightningPickup.vy*dt;
    if(s.lightningPickup.y>H+20)s.lightningPickup=null;
    // collect
    if(s.lightningPickup){
      const lp=s.lightningPickup;
      if(lp.x<s.px+PW&&lp.x+22>s.px&&lp.y<s.py+PH&&lp.y+22>s.py){
        s.lightningPickup=null;s.lightningPower=true;s.lightningTimer=300;
        s.lightningFX=40;audio.lightning();s.score+=300;
      }
    }
  }
  // lightning active
  if(s.lightningPower){
    s.lightningTimer=Math.max(0,s.lightningTimer-dt);
    if(s.lightningTimer<=0){s.lightningPower=false;}
    if(s.lightningFX>0)s.lightningFX=Math.max(0,s.lightningFX-dt);
    s.lightningFlash=(s.lightningFlash+0.18*dt)%(Math.PI*2);
  }

  // capture beam
  if(s.captureState==="beaming"){
    s.captureBeam=Math.min(1,s.captureBeam+0.015*dt);
    if(s.captureBeam>=1){
      const be=s.capturedEnemy,bp=ePos(be);
      const bx=bp.x+EW/2-20,bw=40;
      if(s.px+PW>bx&&s.px<bx+bw&&s.py<bp.y+200&&s.invincible<=0&&!s.lightningPower){
        s.captureState="captured";
        s.capturedShipX=bp.x+EW/2-PW/2;s.capturedShipY=bp.y+EH+10;
        s.captureCooldown=300;audio.capture();
      }
    }
    if(s.captureBeam>0&&s.captureCooldown===0){
      s.captureBeam=Math.max(0,s.captureBeam-0.005*dt);
      if(s.captureBeam===0)s.captureState=null;
    }
  }
  if(s.captureState==="captured"){
    s.captureCooldown=Math.max(0,s.captureCooldown-dt);
    if(s.capturedEnemy?.diving){
      const p=ePos(s.capturedEnemy);
      s.capturedShipX=p.x+EW/2-PW/2;s.capturedShipY=p.y+EH+8;
    }
    if(s.captureCooldown<=0&&!s.capturedEnemy?.alive){
      s.captureState="rescued";s.dual=true;audio.rescue();s.score+=1000;
      setTimeout(()=>{if(S)S.captureState=null;},2000);
    }
    if(s.capturedShipY>H+50){s.captureState=null;s.lives--;if(s.lives<=0){endGame();return;}}
  }
  s.captureCooldown=Math.max(0,(s.captureCooldown||0)-dt);

  // player move
  const spd=(3.5+s.level*0.1)*dt;
  if((keys["ArrowLeft"]||keys["a"])&&s.px>4)s.px-=spd;
  if((keys["ArrowRight"]||keys["d"])&&s.px<W-PW-4)s.px+=spd;

  // shoot
  s.shootCool=Math.max(0,s.shootCool-dt);
  const maxB=s.lightningPower?6:(s.dual?4:2);
  const bCool=s.lightningPower?8:16;
  if((keys[" "]||keys["ArrowUp"])&&s.shootCool<=0&&s.bullets.length<maxB){
    s.bullets.push({x:s.px+PW/2-2,y:s.py-12,lightning:s.lightningPower});
    if(s.dual)s.bullets.push({x:s.px+PW/2+26,y:s.py-12,lightning:s.lightningPower});
    s.shootCool=bCool;audio.shoot();
  }
  s.bullets=s.bullets.filter(b=>b.y>-14);
  s.bullets.forEach(b=>b.y-=7*dt);

  // formation
  if(!s.challenging&&s.entryDone){
    const af=s.enemies.filter(e=>e.alive&&!e.diving);
    const xs=af.map(e=>OX+e.col*GX+s.formX);
    if(xs.length){
      const minX=Math.min(...xs),maxX=Math.max(...xs)+EW;
      s.formX+=s.formDir*(0.7+s.level*0.05)*dt;
      if(maxX>W-8||minX<8)s.formDir*=-1;
    }
  }

  // dive
  s.diveTimer=Math.max(0,s.diveTimer-dt);
  const lf=s.enemies.filter(e=>e.alive&&!e.diving&&!e.captured&&s.entryDone);
  if(s.diveTimer<=0&&lf.length>0&&!s.challenging){
    const pick=lf[Math.floor(Math.random()*lf.length)];
    pick.diving=true;
    const p=ePos(pick);pick.ox=p.x;pick.oy=p.y;
    pick.dx=(s.px-p.x)*0.012;pick.dy=2.5+s.level*0.1;pick.angle=0;
    if(pick.row===0&&s.captureState===null&&s.captureCooldown<=0&&Math.random()<0.4&&!s.lightningPower){
      s.captureState="beaming";s.capturedEnemy=pick;s.captureBeam=0;
    }
    s.diveTimer=50+Math.random()*50;
  }
  s.enemies.forEach(e=>{
    if(!e.alive||!e.diving)return;
    e.ox+=e.dx*dt;e.oy+=e.dy*dt;e.angle+=0.05*dt;e.dx*=0.999;
    if(e.oy>H+50){e.diving=false;e.ox=0;e.oy=0;e.angle=0;}
  });

  // enemy shoot
  s.eCool=Math.max(0,s.eCool-dt);
  if(s.eCool<=0&&!s.challenging){
    const sh=s.enemies.filter(e=>e.alive);
    if(sh.length){
      const e=sh[Math.floor(Math.random()*sh.length)],p=ePos(e);
      const dx=(s.px+PW/2)-(p.x+EW/2),dy=s.py-p.y,mag=Math.sqrt(dx*dx+dy*dy)||1;
      s.eBullets.push({x:p.x+EW/2-2,y:p.y+EH,vx:dx/mag*3,vy:dy/mag*3});
      s.eCool=28+Math.random()*30;
    }
  }
  s.eBullets=s.eBullets.filter(b=>b.y<H+10&&b.x>0&&b.x<W);
  s.eBullets.forEach(b=>{b.x+=b.vx*dt;b.y+=b.vy*dt;});

  // bullets hit enemies — lightning destroys 3x3 area
  s.bullets.forEach((b,bi)=>{
    [...s.enemies,...s.challengeEnemies].forEach(e=>{
      if(!e.alive)return;
      const p=e.id>=1000?{x:e.x-EW/2,y:e.y-EH/2}:ePos(e);
      if(b.x<p.x+EW&&b.x+4>p.x&&b.y<p.y+EH&&b.y+14>p.y){
        if(b.lightning){
          // ⚡ area damage
          [...s.enemies,...s.challengeEnemies].forEach(e2=>{
            if(!e2.alive)return;
            const p2=e2.id>=1000?{x:e2.x-EW/2,y:e2.y-EH/2}:ePos(e2);
            if(Math.abs(p2.x-p.x)<70&&Math.abs(p2.y-p.y)<70){
              e2.alive=false;
              s.score+=(e2.row===0?160:e2.row===1?100:60);s.lightningFX=20;
            }
          });
          s.lightningFX=25;
        }
        e.alive=false;
        s.score+=(e.id>=1000?150:(e.row===0?80:e.row===1?50:30)+(e.diving?100:0));
        s.bullets[bi]=null;s.flash=8;audio.explode();
        if(!s.powerUp&&Math.random()<0.06)s.powerUp={x:p.x+EW/2-10,y:p.y,vy:1.5};
      }
    });
  });
  s.bullets=s.bullets.filter(Boolean);

  // enemy bullets hit player — lightning power = inmune
  if(s.invincible<=0){
    s.eBullets.forEach((b,bi)=>{
      if(s.invincible>0)return;
      if(b.x<s.px+PW-4&&b.x+5>s.px+4&&b.y<s.py+PH&&b.y+8>s.py){
        if(s.lightningPower){s.eBullets[bi]=null;s.lightningFX=15;return;} // ⚡ bloquea
        s.lives--;s.eBullets[bi]=null;s.flash=15;s.dual=false;s.invincible=120;audio.hit();
      }
    });
  }
  s.eBullets=s.eBullets.filter(Boolean);
  s.invincible=Math.max(0,(s.invincible||0)-dt);

  // diving enemy hits player
  if(s.invincible<=0){
    s.enemies.forEach(e=>{
      if(!e.alive||!e.diving)return;
      if(e.oy+EH>s.py&&e.oy<s.py+PH&&e.ox+EW>s.px+4&&e.ox<s.px+PW-4){
        if(s.lightningPower){e.alive=false;s.score+=200;s.lightningFX=20;return;}
        s.lives--;e.alive=false;s.flash=15;s.dual=false;s.invincible=120;audio.hit();
      }
    });
  }

  // power-up (estrella)
  if(s.powerUp){
    s.powerUp.y+=s.powerUp.vy*dt;
    if(s.powerUp.x<s.px+PW&&s.powerUp.x+20>s.px&&s.powerUp.y<s.py+PH&&s.powerUp.y+20>s.py){
      s.dual=true;s.powerUp=null;audio.powerup();s.score+=500;
    }
    if(s.powerUp&&s.powerUp.y>H+10)s.powerUp=null;
  }

  s.flash=Math.max(0,s.flash-dt);
  if(s.lives<=0){endGame();return;}

  // ── DRAW ───────────────────────────────────────────────
  ctx.fillStyle="#000010";ctx.fillRect(0,0,W,H);

  // lightning background glow
  if(s.lightningPower){
    const grd=ctx.createRadialGradient(W/2,H/2,10,W/2,H/2,W);
    const alpha=0.08+0.05*Math.sin(s.lightningFlash);
    grd.addColorStop(0,`rgba(255,220,0,${alpha})`);
    grd.addColorStop(1,"rgba(0,0,0,0)");
    ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);
  }

  s.stars.forEach(st=>{
    ctx.fillStyle=`rgba(255,255,255,${0.3+st.s*0.3})`;
    ctx.fillRect(st.x,st.y,st.s,st.s);
  });

  // challenge label
  if(s.challengeLabel>0){
    ctx.save();ctx.globalAlpha=Math.min(1,s.challengeLabel/60);
    ctx.fillStyle="#ffff00";ctx.font="bold 26px monospace";ctx.textAlign="center";
    ctx.fillText("✦  CHALLENGING STAGE  ✦",W/2,H/2-10);
    ctx.fillStyle="#fff";ctx.font="15px monospace";
    ctx.fillText("¡Destruye todo lo que puedas!",W/2,H/2+18);
    ctx.restore();ctx.textAlign="left";
  }

  // ⚡ lightning pickup
  if(s.lightningPickup){
    const lp=s.lightningPickup;
    const flash=Math.sin(s.frame*0.15)*0.4+0.6;
    ctx.save();
    ctx.shadowBlur=20;ctx.shadowColor="#ffdd00";
    ctx.fillStyle=`rgba(255,220,0,${flash})`;
    ctx.font="bold 22px monospace";ctx.textAlign="center";
    ctx.fillText("⚡",lp.x+11,lp.y+18);
    ctx.font="9px monospace";ctx.fillStyle="#ffaaff";
    ctx.fillText("1°A",lp.x+11,lp.y+30);
    ctx.restore();ctx.textAlign="left";
  }

  // capture beam
  if(s.captureState==="beaming"&&s.capturedEnemy?.alive){
    const p=ePos(s.capturedEnemy),bx=p.x+EW/2,by=p.y+EH,bh=s.captureBeam*200;
    const grd=ctx.createLinearGradient(bx,by,bx,by+bh);
    grd.addColorStop(0,"rgba(100,200,255,0.7)");grd.addColorStop(1,"rgba(100,200,255,0)");
    ctx.fillStyle=grd;ctx.beginPath();
    ctx.moveTo(bx-20,by);ctx.lineTo(bx+20,by);ctx.lineTo(bx+35,by+bh);ctx.lineTo(bx-35,by+bh);
    ctx.closePath();ctx.fill();
    ctx.fillStyle="#aaffff";ctx.font="11px monospace";ctx.textAlign="center";
    ctx.fillText("¡TRACTOR BEAM!",bx,by+bh+14);ctx.textAlign="left";
  }

  // challenge enemies
  s.challengeEnemies.forEach(e=>{
    if(!e.alive)return;
    ctx.save();ctx.translate(e.x,e.y);drawEnemy(ctx,1,"#ff88ff",s.frame);ctx.restore();
  });

  // formation enemies
  s.enemies.forEach(e=>{
    if(!e.alive)return;
    const p=ePos(e);
    ctx.save();ctx.translate(p.x+EW/2,p.y+EH/2);
    if(e.diving)ctx.rotate(Math.sin(e.angle)*0.45);
    drawEnemy(ctx,e.row,COLORS[e.row],s.frame);ctx.restore();
  });

  // bullets
  s.bullets.forEach(b=>{
    if(b.lightning){
      ctx.save();
      ctx.strokeStyle=`hsl(${s.frame*10%360},100%,70%)`;
      ctx.lineWidth=3;ctx.shadowBlur=12;ctx.shadowColor="#ffdd00";
      ctx.beginPath();
      let bx=b.x+2,by=b.y;
      ctx.moveTo(bx,by);
      for(let i=0;i<4;i++){ctx.lineTo(bx+(Math.random()*6-3),by-4);by-=4;}
      ctx.stroke();ctx.restore();
    }else{
      ctx.fillStyle=s.flash>0?"#ffff88":"#88ffff";
      ctx.shadowBlur=8;ctx.shadowColor="#88ffff";
      ctx.fillRect(b.x,b.y,4,14);ctx.shadowBlur=0;
    }
  });
  s.eBullets.forEach(b=>{
    ctx.fillStyle="#ff4444";ctx.shadowBlur=6;ctx.shadowColor="#ff0000";
    ctx.fillRect(b.x,b.y,5,10);ctx.shadowBlur=0;
  });

  // power-up estrella
  if(s.powerUp){
    ctx.fillStyle=`hsl(${s.frame*6%360},100%,60%)`;
    ctx.shadowBlur=12;ctx.shadowColor="#ffffff";
    ctx.font="bold 18px monospace";ctx.textAlign="center";
    ctx.fillText("★",s.powerUp.x+10,s.powerUp.y+16);
    ctx.textAlign="left";ctx.shadowBlur=0;
  }

  // captured ship
  if(s.captureState==="captured"||s.captureState==="rescued"){
    ctx.save();ctx.globalAlpha=s.captureState==="rescued"?0.5:1;
    drawShip(ctx,s.capturedShipX,s.capturedShipY,tc);ctx.restore();
  }

  // ⚡ lightning FX overlay
  if(s.lightningFX>0){
    ctx.save();ctx.globalAlpha=Math.min(0.5,s.lightningFX/20);
    ctx.fillStyle="#ffdd00";ctx.fillRect(0,0,W,H);ctx.restore();
    // bolts
    ctx.save();ctx.strokeStyle="#ffffff";ctx.lineWidth=2;ctx.globalAlpha=0.8;
    for(let i=0;i<4;i++){
      ctx.beginPath();ctx.moveTo(s.px+PW/2,s.py);
      let bx=s.px+PW/2,by=s.py;
      for(let j=0;j<8;j++){bx+=Math.random()*30-15;by-=Math.random()*20+10;ctx.lineTo(bx,by);}
      ctx.stroke();
    }
    ctx.restore();
  }

  // player
  if(!(s.flash>0&&Math.floor(s.invincible/6)%2===0)){
    if(s.lightningPower){
      // ⚡ aura
      ctx.save();
      ctx.shadowBlur=22+10*Math.sin(s.lightningFlash);
      ctx.shadowColor="#ffdd00";
      drawShip(ctx,s.px,s.py,tc,true);
      ctx.restore();
    }else{
      drawShip(ctx,s.px,s.py,tc);
    }
    if(s.dual)drawShip(ctx,s.px+28,s.py,tc,s.lightningPower);
  }

  // HUD
  ctx.fillStyle="#aaffee";ctx.font="bold 13px monospace";
  ctx.fillText(`SCORE  ${s.score}`,10,22);
  ctx.fillStyle="#ff8855";
  ctx.fillText(`HI  ${Math.max(s.score,hiScore)}`,W-110,22);
  ctx.fillStyle="#ffcc44";
  ctx.fillText(`LVL ${s.level}`,W/2-20,22);
  for(let i=0;i<s.lives;i++)drawShipMini(ctx,10+i*24,H-22,tc);

  // team badge HUD
  ctx.fillStyle=tc.color;ctx.font="bold 12px monospace";ctx.textAlign="right";
  ctx.fillText(`[ ${tc.label} ]`,W-6,H-24);ctx.textAlign="left";

  if(s.dual){
    ctx.fillStyle="#88ffff";ctx.font="11px monospace";
    ctx.fillText("★ DUAL SHIP",W/2-35,H-8);
  }

  // lightning HUD bar
  if(s.lightningPower){
    const bw=120,bh=8,bx=W/2-bw/2,by=H-38;
    ctx.fillStyle="#333";ctx.fillRect(bx,by,bw,bh);
    const ratio=s.lightningTimer/300;
    const grd=ctx.createLinearGradient(bx,by,bx+bw,by);
    grd.addColorStop(0,"#ffdd00");grd.addColorStop(1,"#ff8800");
    ctx.fillStyle=grd;ctx.fillRect(bx,by,bw*ratio,bh);
    ctx.strokeStyle="#ffdd00";ctx.lineWidth=1;ctx.strokeRect(bx,by,bw,bh);
    ctx.fillStyle="#ffaaff";ctx.font="10px monospace";ctx.textAlign="center";
    ctx.fillText("⚡ 1°A POWER",W/2,by-3);ctx.textAlign="left";
  }

  // credit
  ctx.fillStyle="rgba(255,136,85,0.5)";ctx.font="10px monospace";ctx.textAlign="right";
  ctx.fillText("Eliseo Espinoza",W-6,H-6);ctx.textAlign="left";

  raf=requestAnimationFrame(loop);
}

// ── Draw helpers ─────────────────────────────────────────
function drawShip(ctx,x,y,tc,glowing=false){
  const col=tc?tc.shipColor:"#44aaff";
  const acc=tc?tc.accent:"#aaeeff";
  ctx.save();ctx.translate(x+PW/2,y+PH/2);
  ctx.fillStyle=col;
  ctx.beginPath();ctx.moveTo(0,-PH/2);ctx.lineTo(PW/2-2,PH/2);ctx.lineTo(-PW/2+2,PH/2);ctx.closePath();ctx.fill();
  ctx.fillStyle=glowing?"#ffdd44":"#2266cc";ctx.fillRect(-PW/2,4,10,8);ctx.fillRect(PW/2-10,4,10,8);
  ctx.fillStyle=acc;ctx.beginPath();ctx.arc(0,-2,5,0,Math.PI*2);ctx.fill();
  // team label on ship
  if(tc){
    ctx.fillStyle="#ffffff";ctx.font="bold 7px monospace";ctx.textAlign="center";
    ctx.fillText(tc.label,0,PH/2-3);
  }
  ctx.restore();
}
function drawShipMini(ctx,x,y,tc){
  const col=tc?tc.shipColor:"#44aaff";
  ctx.save();ctx.translate(x+8,y);
  ctx.fillStyle=col;
  ctx.beginPath();ctx.moveTo(0,-8);ctx.lineTo(8,8);ctx.lineTo(-8,8);ctx.closePath();ctx.fill();
  ctx.restore();
}
function drawEnemy(ctx,row,col,frame){
  const t=frame*0.05;ctx.fillStyle=col;
  if(row===0){
    ctx.beginPath();ctx.ellipse(-8,0,8,5,-0.3+Math.sin(t)*0.15,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(8,0,8,5,0.3-Math.sin(t)*0.15,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#fff";ctx.beginPath();ctx.arc(0,0,5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=col;ctx.beginPath();ctx.arc(0,0,3,0,Math.PI*2);ctx.fill();
  }else if(row===1){
    ctx.beginPath();ctx.ellipse(0,0,10,7,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#000010";ctx.fillRect(-9,-2,18,4);
    ctx.fillStyle="rgba(200,200,255,0.5)";
    ctx.beginPath();ctx.ellipse(-7,-5+Math.sin(t)*2,5,3,-0.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(7,-5+Math.sin(t+Math.PI)*2,5,3,0.5,0,Math.PI*2);ctx.fill();
  }else{
    ctx.beginPath();ctx.rect(-10,-7,20,14);ctx.fill();
    ctx.fillStyle="#000010";ctx.fillRect(-6,-4,4,5);ctx.fillRect(2,-4,4,5);
    ctx.fillStyle=col;ctx.fillRect(-8,-11,2,6);ctx.fillRect(6,-11,2,6);
  }
}

// ── Game control ─────────────────────────────────────────
function startGame(){
  audio.resume();audio.stage();audio.startBg();
  S=initState(1);last=0;phase="play";
  ui.style.display="none";
  btns.style.display="flex";
  cancelAnimationFrame(raf);
  raf=requestAnimationFrame(loop);
}

function endGame(){
  phase="over";cancelAnimationFrame(raf);
  audio.stopBg();
  hiScore=Math.max(hiScore,S.score);
  const tc=TEAMS[S.team];
  btns.style.display="none";
  ui.style.display="block";
  ui.innerHTML=`
    <h1>💀 GAME OVER</h1>
    <div style="color:${tc.color};font-size:clamp(14px,4vw,18px);margin-bottom:6px;">⚔️ ${tc.name}</div>
    <div class="dev">Desarrollado por <b>Eliseo Espinoza</b></div>
    <div style="color:#ff8855;font-size:clamp(16px,5vw,22px);margin-bottom:4px">SCORE: ${S.score}</div>
    <div style="color:#ffcc44;font-size:clamp(12px,3.5vw,16px);margin-bottom:16px">HI-SCORE: ${hiScore}</div>
    <div style="color:#ffaaff;font-size:clamp(12px,3vw,15px);margin-bottom:12px;">⚡ Elige tu equipo:</div>
    <div id="teamsel">
      <button class="tmbtn t29 ${S.team==='29'?'sel':''}" id="btn29r">EQUIPO 29</button>
      <button class="tmbtn t559 ${S.team==='559'?'sel':''}" id="btn559r">EQUIPO 559</button>
    </div>
    <br/>
    <button id="btn" style="padding:14px 40px;font-size:clamp(14px,4vw,18px);background:#ffcc00;border:none;border-radius:8px;cursor:pointer;font-weight:bold;letter-spacing:2px;box-shadow:0 0 24px #ffaa00;font-family:monospace;">▶ PLAY AGAIN</button>`;
  document.getElementById("btn29r").onclick=()=>{
    selectedTeam="29";
    document.getElementById("btn29r").classList.add("sel");
    document.getElementById("btn559r").classList.remove("sel");
  };
  document.getElementById("btn559r").onclick=()=>{
    selectedTeam="559";
    document.getElementById("btn559r").classList.add("sel");
    document.getElementById("btn29r").classList.remove("sel");
  };
  document.getElementById("btn").onclick=startGame;
}

// ── Keyboard ─────────────────────────────────────────────
window.addEventListener("keydown",e=>{keys[e.key]=true;
  if([" ","ArrowLeft","ArrowRight","ArrowUp"].includes(e.key))e.preventDefault();});
window.addEventListener("keyup",e=>keys[e.key]=false);

function hold(id,key){
  const el=document.getElementById(id);
  el.addEventListener("pointerdown",e=>{e.preventDefault();keys[key]=true;});
  el.addEventListener("pointerup",e=>{e.preventDefault();keys[key]=false;});
  el.addEventListener("pointerleave",e=>{e.preventDefault();keys[key]=false;});
}
hold("bl","ArrowLeft");hold("bf"," ");hold("br","ArrowRight");

function resize(){
  const pad=130;
  const maxH=window.innerHeight-pad;
  const scale=Math.min(window.innerWidth/W,maxH/H,1);
  canvas.style.width=W*scale+"px";
  canvas.style.height=H*scale+"px";
}
window.addEventListener("resize",resize);resize();

document.getElementById("btn").onclick=startGame;
</script>
</body>
</html>
