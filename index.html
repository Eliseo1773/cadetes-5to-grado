<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>👾 CADETES SPACE INVADERS - Desarrollado por Eliseo Espinoza</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #000;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* CRT Effect */
        .crt::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        /* Pantalla de inicio */
        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            border: 4px solid #0f0;
        }

        #startScreen h1 {
            font-size: 1.8em;
            color: #0f0;
            text-align: center;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #0f0;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        .developer {
            color: #f0f;
            font-size: 0.9em;
            margin-bottom: 20px;
        }

        .instructions {
            color: #0f0;
            text-align: center;
            margin: 15px;
            font-size: 0.85em;
            max-width: 450px;
            border: 2px solid #0f0;
            padding: 15px;
            background: rgba(0,255,0,0.1);
        }

        .controls-info {
            margin-top: 10px;
            color: #fff;
        }

        .key {
            background: #333;
            padding: 3px 8px;
            border: 1px solid #666;
            color: #0f0;
        }

        .level-select {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 15px;
            max-width: 350px;
        }

        .level-btn {
            background: #000;
            border: 2px solid #0f0;
            padding: 12px;
            font-size: 0.9em;
            color: #0f0;
            cursor: pointer;
            font-family: 'Courier New', monospace;
        }

        .level-btn:hover {
            background: #0f0;
            color: #000;
        }

        /* Área de juego */
        #gameArea {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: none;
            background: #000;
        }

        /* UI */
        #topUI {
            position: absolute;
            top: 5px;
            left: 5px;
            right: 5px;
            display: flex;
            justify-content: space-between;
            color: #0f0;
            font-size: 1em;
            z-index: 50;
            background: #000;
            padding: 5px;
            border-bottom: 2px solid #0f0;
        }

        #lives { color: #f00; }
        #score { color: #0f0; }

        /* Nave del jugador */
        #player {
            position: absolute;
            bottom: 60px;
            width: 40px;
            height: 30px;
            font-size: 2em;
            z-index: 10;
            text-align: center;
            transition: left 0.1s;
        }

        /* Disparos */
        .shot {
            position: absolute;
            width: 4px;
            height: 15px;
            background: #0f0;
            box-shadow: 0 0 8px #0f0;
            z-index: 9;
        }

        .enemy-shot {
            position: absolute;
            width: 4px;
            height: 10px;
            background: #f00;
            box-shadow: 0 0 5px #f00;
            z-index: 9;
        }

        /* Enemigos */
        .enemy {
            position: absolute;
            width: 35px;
            height: 35px;
            font-size: 1.6em;
            text-align: center;
            z-index: 5;
            transition: transform 0.1s;
        }

        .enemy.bad { filter: drop-shadow(0 0 5px #f00); }
        .enemy.good { filter: drop-shadow(0 0 5px #0f0); }

        /* Explosión */
        .explosion {
            position: absolute;
            font-size: 2em;
            animation: explode 0.4s ease-out forwards;
            z-index: 15;
            pointer-events: none;
        }

        @keyframes explode {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        /* Puntos */
        .points {
            position: absolute;
            font-weight: bold;
            font-size: 1em;
            animation: floatUp 0.6s ease-out forwards;
            z-index: 20;
            pointer-events: none;
        }

        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-30px); opacity: 0; }
        }

        .points-good { color: #0f0; }
        .points-bad { color: #f00; }

        /* Controles móviles */
        #mobileControls {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 55px;
            background: #111;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 15px;
            border-top: 2px solid #0f0;
            z-index: 100;
        }

        .move-btn {
            width: 50px;
            height: 45px;
            background: #000;
            border: 2px solid #0f0;
            color: #0f0;
            font-size: 1.3em;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .move-btn:active {
            background: #0f0;
            color: #000;
        }

        #fireBtn {
            width: 100px;
            height: 45px;
            background: #f00;
            border: 2px solid #fff;
            color: #fff;
            font-size: 0.9em;
            font-weight: bold;
            cursor: pointer;
        }

        #fireBtn:active {
            background: #900;
        }

        /* Pantalla final */
        #endScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            border: 4px solid #0f0;
        }

        #endScreen h2 {
            color: #0f0;
            font-size: 1.8em;
            margin-bottom: 15px;
            animation: blink 1s infinite;
        }

        #finalScore {
            font-size: 2.5em;
            color: #0f0;
            margin: 15px;
        }

        .game-btn {
            background: #000;
            color: #0f0;
            border: 2px solid #0f0;
            padding: 12px 25px;
            font-size: 1em;
            cursor: pointer;
            margin: 10px;
            font-family: 'Courier New', monospace;
        }

        .game-btn:hover {
            background: #0f0;
            color: #000;
        }

        /* Responsive */
        @media (min-width: 768px) {
            #mobileControls { display: none; }
            #player { bottom: 10px; }
        }

        @media (max-width: 767px) {
            #startScreen h1 { font-size: 1.4em; }
            .enemy { width: 30px; height: 30px; font-size: 1.4em; }
            #player { width: 35px; height: 25px; font-size: 1.7em; }
        }
    </style>
</head>
<body class="crt">

    <div id="startScreen">
        <h1>👾 CADETES<br>SPACE INVADERS 👾</h1>
        <div class="developer">Desarrollado por Eliseo Espinoza</div>
        
        <div class="instructions">
            <div style="color:#fff; margin-bottom:10px;">
                DESTRUYE LOS MALOS • EVITA LOS BUENOS
            </div>
            
            <div class="controls-info">
                <strong>PC:</strong> <span class="key">←</span> <span class="key">→</span> Mover • <span class="key">ESPACIO</span> Disparar<br>
                <strong>Celular:</strong> Botones ← → y 🔴
            </div>
            
            <div style="margin-top:10px; font-size:0.8em;">
                👾☄️💣 = +100 pts | 🚀⭐✨ = -50 pts
            </div>
        </div>

        <div class="level-select">
            <button class="level-btn" onclick="startGame(1)">
                NIVEL 1<br>FÁCIL
            </button>
            <button class="level-btn" onclick="startGame(2)">
                NIVEL 2<br>NORMAL
            </button>
            <button class="level-btn" onclick="startGame(3)">
                NIVEL 3<br>DIFÍCIL
            </button>
            <button class="level-btn" onclick="startGame(4)">
                NIVEL 4<br>EXTREMO
            </button>
        </div>
    </div>

    <div id="gameArea">
        <div id="topUI">
            <div id="lives">VIDAS: ❤️❤️❤️</div>
            <div id="score">PUNTOS: 0</div>
            <div id="level">NIVEL 1</div>
        </div>

        <div id="player">🛸</div>

        <div id="mobileControls">
            <div class="move-btn" id="leftBtn">←</div>
            <button id="fireBtn">🔥 FUEGO</button>
            <div class="move-btn" id="rightBtn">→</div>
        </div>
    </div>

    <div id="endScreen">
        <h2 id="endTitle">GAME OVER</h2>
        <div id="finalScore">0</div>
        <div id="stats" style="color:#0f0; margin:10px; text-align:center; font-size:0.9em;"></div>
        <button class="game-btn" onclick="location.reload()">JUGAR DE NUEVO</button>
        <div class="developer" style="margin-top:15px;">Desarrollado por Eliseo Espinoza</div>
    </div>

    <script>
        // Configuración de niveles
        const levels = {
            1: { rows: 3, cols: 6, speed: 0.3, dropSpeed: 20, shootChance: 0.001 },
            2: { rows: 4, cols: 7, speed: 0.5, dropSpeed: 15, shootChance: 0.002 },
            3: { rows: 4, cols: 8, speed: 0.7, dropSpeed: 12, shootChance: 0.003 },
            4: { rows: 5, cols: 8, speed: 1, dropSpeed: 10, shootChance: 0.005 }
        };

        const badEmojis = ['👾', '👽', '☄️', '💣', '🦠'];
        const goodEmojis = ['🚀', '⭐', '🛸', '✨', '🌟'];

        let gameState = {
            score: 0,
            lives: 3,
            level: 1,
            isPlaying: false,
            playerX: 50,
            enemies: [],
            shots: [],
            enemyShots: [],
            direction: 1,
            dropTimer: 0,
            speed: 0.3,
            shootChance: 0.001
        };

        let audio;
        let gameLoopId;
        let moveLeft = false;
        let moveRight = false;

        function startGame(levelNum) {
            const config = levels[levelNum];
            gameState.level = levelNum;
            gameState.speed = config.speed;
            gameState.shootChance = config.shootChance;
            
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameArea').style.display = 'block';
            document.getElementById('level').textContent = `NIVEL ${levelNum}`;
            
            initAudio();
            createEnemies(config.rows, config.cols);
            setupControls();
            
            gameState.isPlaying = true;
            gameLoopId = requestAnimationFrame(gameLoop);
        }

        function initAudio() {
            const files = {
                1: "Neon Rhythm Strike.mp3",
                2: "Neon Rhythm Strike (1).mp3",
                3: "Neon Rhythm Strike (2).mp3",
                4: "Neon Rhythm Strike (3).mp3"
            };
            audio = new Audio(files[gameState.level]);
            audio.loop = true;
            audio.volume = 0.5;
            audio.play().catch(() => {});
        }

        function createEnemies(rows, cols) {
            const gameArea = document.getElementById('gameArea');
            const width = gameArea.clientWidth;
            const startX = (width - (cols * 45)) / 2;
            
            for (let row = 0; row < rows; row++) {
                for (let col = 0; col < cols; col++) {
                    const isBad = Math.random() > 0.2; // 80% malos, 20% buenos
                    const emoji = isBad ? 
                        badEmojis[Math.floor(Math.random() * badEmojis.length)] :
                        goodEmojis[Math.floor(Math.random() * goodEmojis.length)];
                    
                    const enemy = document.createElement('div');
                    enemy.className = `enemy ${isBad ? 'bad' : 'good'}`;
                    enemy.textContent = emoji;
                    enemy.style.left = (startX + col * 45) + 'px';
                    enemy.style.top = (50 + row * 45) + 'px';
                    enemy.dataset.isBad = isBad;
                    
                    gameArea.appendChild(enemy);
                    
                    gameState.enemies.push({
                        element: enemy,
                        x: startX + col * 45,
                        y: 50 + row * 45,
                        isBad: isBad,
                        row: row,
                        col: col
                    });
                }
            }
        }

        function gameLoop() {
            if (!gameState.isPlaying) return;
            
            // Mover jugador
            if (moveLeft) gameState.playerX -= 1.5;
            if (moveRight) gameState.playerX += 1.5;
            gameState.playerX = Math.max(5, Math.min(95, gameState.playerX));
            document.getElementById('player').style.left = gameState.playerX + '%';
            
            // Mover formación de enemigos
            let hitEdge = false;
            gameState.enemies.forEach(enemy => {
                enemy.x += gameState.speed * gameState.direction;
                if (enemy.x <= 10 || enemy.x >= window.innerWidth - 50) {
                    hitEdge = true;
                }
            });
            
            // Si tocan borde, bajar y cambiar dirección
            if (hitEdge) {
                gameState.direction *= -1;
                gameState.enemies.forEach(enemy => {
                    enemy.y += 20;
                    enemy.element.style.top = enemy.y + 'px';
                });
            }
            
            // Actualizar posición enemigos
            gameState.enemies.forEach(enemy => {
                enemy.element.style.left = enemy.x + 'px';
                
                // Verificar si llegaron abajo
                if (enemy.y > window.innerHeight - 100) {
                    endGame(false);
                    return;
                }
            });
            
            // Enemigos disparan
            if (Math.random() < gameState.shootChance && gameState.enemies.length > 0) {
                const shooter = gameState.enemies[Math.floor(Math.random() * gameState.enemies.length)];
                createEnemyShot(shooter.x + 15, shooter.y + 30);
            }
            
            // Mover disparos del jugador
            gameState.shots.forEach((shot, index) => {
                shot.y -= 8;
                shot.element.style.top = shot.y + 'px';
                
                // Colisión con enemigos
                gameState.enemies.forEach((enemy, eIndex) => {
                    if (isColliding(shot.element, enemy.element)) {
                        // Impacto!
                        if (enemy.isBad) {
                            gameState.score += 100;
                            showPoints(enemy.x, enemy.y, '+100', 'good');
                        } else {
                            gameState.score = Math.max(0, gameState.score - 50);
                            showPoints(enemy.x, enemy.y, '-50', 'bad');
                        }
                        
                        createExplosion(enemy.x, enemy.y);
                        enemy.element.remove();
                        gameState.enemies.splice(eIndex, 1);
                        shot.element.remove();
                        gameState.shots.splice(index, 1);
                        updateUI();
                        
                        // Victoria si destruye todos los malos
                        const badsLeft = gameState.enemies.filter(e => e.isBad).length;
                        if (badsLeft === 0) {
                            endGame(true);
                        }
                    }
                });
                
                if (shot.y < 0) {
                    shot.element.remove();
                    gameState.shots.splice(index, 1);
                }
            });
            
            // Mover disparos enemigos
            gameState.enemyShots.forEach((shot, index) => {
                shot.y += 5;
                shot.element.style.top = shot.y + 'px';
                
                // Colisión con jugador
                const player = document.getElementById('player');
                if (isColliding(shot.element, player)) {
                    gameState.lives--;
                    updateLives();
                    createExplosion(gameState.playerX, window.innerHeight - 80);
                    shot.element.remove();
                    gameState.enemyShots.splice(index, 1);
                    
                    if (gameState.lives <= 0) {
                        endGame(false);
                    }
                }
                
                if (shot.y > window.innerHeight) {
                    shot.element.remove();
                    gameState.enemyShots.splice(index, 1);
                }
            });
            
            updateUI();
            gameLoopId = requestAnimationFrame(gameLoop);
        }

        function isColliding(el1, el2) {
            const rect1 = el1.getBoundingClientRect();
            const rect2 = el2.getBoundingClientRect();
            return !(rect1.right < rect2.left || rect1.left > rect2.right || 
                     rect1.bottom < rect2.top || rect1.top > rect2.bottom);
        }

        function shoot() {
            if (!gameState.isPlaying) return;
            
            const shot = document.createElement('div');
            shot.className = 'shot';
            shot.style.left = `calc(${gameState.playerX}% + 18px)`;
            shot.style.top = (window.innerHeight - 90) + 'px';
            document.getElementById('gameArea').appendChild(shot);
            
            gameState.shots.push({
                element: shot,
                y: window.innerHeight - 90
            });
        }

        function createEnemyShot(x, y) {
            const shot = document.createElement('div');
            shot.className = 'enemy-shot';
            shot.style.left = x + 'px';
            shot.style.top = y + 'px';
            document.getElementById('gameArea').appendChild(shot);
            
            gameState.enemyShots.push({
                element: shot,
                y: y
            });
        }

        function createExplosion(x, y) {
            const exp = document.createElement('div');
            exp.className = 'explosion';
            exp.textContent = '💥';
            exp.style.left = x + 'px';
            exp.style.top = y + 'px';
            document.getElementById('gameArea').appendChild(exp);
            setTimeout(() => exp.remove(), 400);
        }

        function showPoints(x, y, text, type) {
            const points = document.createElement('div');
            points.className = `points points-${type}`;
            points.textContent = text;
            points.style.left = x + 'px';
            points.style.top = y + 'px';
            document.getElementById('gameArea').appendChild(points);
            setTimeout(() => points.remove(), 600);
        }

        function updateLives() {
            document.getElementById('lives').textContent = `VIDAS: ${'❤️'.repeat(gameState.lives)}${'🖤'.repeat(3-gameState.lives)}`;
        }

        function updateUI() {
            document.getElementById('score').textContent = `PUNTOS: ${gameState.score}`;
        }

        function setupControls() {
            // Teclado
            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space') {
                    e.preventDefault();
                    shoot();
                }
                if (e.key === 'ArrowLeft' || e.key === 'a') moveLeft = true;
                if (e.key === 'ArrowRight' || e.key === 'd') moveRight = true;
            });
            
            document.addEventListener('keyup', (e) => {
                if (e.key === 'ArrowLeft' || e.key === 'a') moveLeft = false;
                if (e.key === 'ArrowRight' || e.key === 'd') moveRight = false;
            });
            
            // Móvil
            const leftBtn = document.getElementById('leftBtn');
            const rightBtn = document.getElementById('rightBtn');
            const fireBtn = document.getElementById('fireBtn');
            
            leftBtn.addEventListener('touchstart', (e) => { e.preventDefault(); moveLeft = true; });
            leftBtn.addEventListener('touchend', () => moveLeft = false);
            rightBtn.addEventListener('touchstart', (e) => { e.preventDefault(); moveRight = true; });
            rightBtn.addEventListener('touchend', () => moveRight = false);
            fireBtn.addEventListener('touchstart', (e) => { e.preventDefault(); shoot(); });
            fireBtn.addEventListener('click', shoot);
        }

        function endGame(won) {
            gameState.isPlaying = false;
            cancelAnimationFrame(gameLoopId);
            if (audio) audio.pause();
            
            document.getElementById('endScreen').style.display = 'flex';
            document.getElementById('endTitle').textContent = won ? '¡VICTORIA!' : 'GAME OVER';
            document.getElementById('endTitle').style.color = won ? '#0f0' : '#f00';
            document.getElementById('finalScore').textContent = gameState.score;
            
            const badsDestroyed = gameState.enemies.filter(e => !e.isBad).length; // Aproximado
            document.getElementById('stats').innerHTML = `
                NIVEL ${gameState.level} COMPLETADO<br>
                PUNTUACIÓN FINAL: ${gameState.score}
            `;
        }

        // Prevenir zoom
        document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
    </script>

</body>
</html>
