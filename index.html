<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>👾 CADETES SPACE INVADERS</title>
<style>
/* --- Optimizaciones de Rendimiento y Estilo --- */
*{margin:0;padding:0;box-sizing:border-box;touch-action:none;user-select:none;-webkit-user-select:none;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Courier New',monospace;}
#stars{position:fixed;inset:0;z-index:0;pointer-events:none;}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--d) infinite var(--dl);}
@keyframes twinkle{0%,100%{opacity:.15}50%{opacity:.9}}

/* Efecto de sacudida cuando te golpean */
.shake { animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both; }
@keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }

#lightning{position:fixed;inset:0;z-index:500;pointer-events:none;display:none;background:linear-gradient(135deg,rgba(80,0,255,.12),rgba(0,180,255,.08));animation:storm .14s infinite;}
@keyframes storm{0%{opacity:0}30%{opacity:1}60%{opacity:.3}80%{opacity:.7}100%{opacity:0}}
#lbolt{position:fixed;z-index:501;pointer-events:none;font-size:3.5em;display:none;animation:boltAnim .16s infinite;}
@keyframes boltAnim{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(8deg)}}
#bombFlash{position:fixed;inset:0;z-index:400;background:rgba(255,180,0,.4);display:none;pointer-events:none;}

.screen{position:fixed;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:200;padding:12px;}
#startScreen{background:radial-gradient(ellipse at center,#001500 0%,#000 70%);}
#startScreen h1{font-size:clamp(1.3em,5vw,2.5em);color:#0f0;text-align:center;margin-bottom:10px;text-shadow:0 0 20px #0f0;letter-spacing:3px;}

.box{border:1px solid #0f0;padding:15px;background:rgba(0,255,0,0.05);width:92%;max-width:450px;text-align:center;border-radius:10px;}
.pu-badge{background:rgba(255,255,255,0.1);border:1px solid #444;border-radius:5px;padding:4px 8px;font-size:.7em;color:#ddd;display:inline-block;margin:2px;}

.start-btn{background:linear-gradient(135deg,#060,#0f0);color:#000;border:none;padding:15px 40px;font-size:1.2em;font-weight:bold;cursor:pointer;margin-top:20px;border-radius:50px;box-shadow:0 0 20px rgba(0,255,0,0.4);}

#gameArea{position:fixed;inset:0;display:none;z-index:10;}
#hud{position:fixed;top:0;left:0;right:0;height:50px;display:flex;justify-content:space-between;align-items:center;color:#0f0;font-size:clamp(0.7em, 3vw, 1em);z-index:50;background:rgba(0,0,0,0.8);padding:0 15px;border-bottom:1px solid #0f0;}

#player{position:fixed;font-size:clamp(1.8em,6vw,2.5em);z-index:20;transform:translateX(-50%);transition: transform 0.1s ease-out;}
.shot{position:fixed;width:4px;height:18px;background:#0f0;box-shadow:0 0 8px #0f0;border-radius:2px;}
.enemy-shot{position:fixed;width:4px;height:12px;background:#f44;box-shadow:0 0 8px #f44;}

/* Controles móviles mejorados */
#mobileControls{position:fixed;bottom:20px;left:0;width:100%;display:flex;justify-content:space-between;padding:0 30px;z-index:300;}
.arrow-btn{width:70px;height:70px;background:rgba(0,255,0,0.1);border:2px solid #0f0;border-radius:15px;color:#0f0;font-size:2em;display:flex;align-items:center;justify-content:center;}
#fireBtn{width:85px;height:85px;background:rgba(255,0,0,0.2);border:3px solid #f44;border-radius:50%;color:#f44;font-size:2em;display:flex;align-items:center;justify-content:center;}
@media(min-width:769px){#mobileControls{display:none!important;}}
</style>
</head>
<body>

<div id="stars"></div>
<div id="lightning"></div>
<div id="lbolt">⚡</div>
<div id="bombFlash"></div>

<div id="startScreen" class="screen">
    <h1>👾 MISION: CADETES</h1>
    <div style="color:#0f0; margin-bottom:15px;">¡Protejan la base, alumnos!</div>
    <div class="box">
        <div class="pu-badge">⚡ Triple</div>
        <div class="pu-badge">🛡️ Escudo</div>
        <div class="pu-badge">💊 Vida</div>
        <div class="pu-badge">💣 Bomba</div>
        <p style="color:#aaa; font-size:0.8em; margin-top:10px;">Usa las flechas o toca los botones para jugar</p>
    </div>
    <button class="start-btn" id="startBtn">DESPEGAR 🚀</button>
</div>

<div id="gameArea">
    <div id="hud">
        <div id="lives">VIDAS: ❤️❤️❤️</div>
        <div id="score">PUNTOS: 0</div>
        <div id="levelInd">NIVEL 1/16</div>
    </div>
    <div id="player">🛸</div>
    <div id="pshield" style="display:none; position:fixed; border:2px solid #0af; border-radius:50%; background:rgba(0,180,255,0.1); pointer-events:none; z-index:19;"></div>
    
    <div id="mobileControls">
        <div style="display:flex; gap:15px;">
            <div class="arrow-btn" id="leftBtn">◀</div>
            <div class="arrow-btn" id="rightBtn">▶</div>
        </div>
        <div id="fireBtn">💥</div>
    </div>
</div>

<div id="lvlScreen" class="screen" style="display:none; background:rgba(0,0,0,0.9);">
    <h2 id="lvlTitle" style="color:#0f0; font-size:2em;">¡NIVEL SUPERADO!</h2>
    <div id="lvlBarContainer" style="width:250px; height:10px; border:1px solid #0f0; margin-top:20px; border-radius:5px;">
        <div id="lvlBar" style="width:0%; height:100%; background:#0f0;"></div>
    </div>
</div>

<div id="endScreen" class="screen" style="display:none; background:#000;">
    <h2 id="endTitle" style="color:#f44; font-size:2.5em;">FIN DEL JUEGO</h2>
    <h1 id="finalScore" style="color:#fff;">0</h1>
    <button class="start-btn" onclick="location.reload()">REINTENTAR 🔄</button>
</div>

<script>
/* --- LÓGICA DEL JUEGO MEJORADA --- */
const $ = id => document.getElementById(id);
let G = {
    playing: false,
    lvl: 0,
    score: 0,
    lives: 3,
    px: 50,
    enemies: [],
    shots: [],
    eShots: [],
    gameLoopId: null,
    currentSession: 0
};

// Configuración de Niveles
const LEVELS = Array.from({length: 16}, (_, i) => ({
    rows: 3 + Math.floor(i/4),
    cols: 6 + Math.floor(i/2),
    spd: 50 + (i * 15),
    shoot: 0.001 + (i * 0.0005)
}));

function initStars() {
    for(let i=0; i<80; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        s.style.left = Math.random()*100+'%';
        s.style.top = Math.random()*100+'%';
        s.style.width = s.style.height = (Math.random()*2+1)+'px';
        s.style.setProperty('--d', (Math.random()*3+2)+'s');
        s.style.setProperty('--dl', (Math.random()*-5)+'s');
        $('stars').appendChild(s);
    }
}

function loadLevel(n) {
    // 1. Limpiar sesión anterior para evitar el bug de velocidad
    G.currentSession++;
    if (G.gameLoopId) cancelAnimationFrame(G.gameLoopId);
    
    const session = G.currentSession;
    G.lvl = n;
    G.enemies = [];
    G.shots = [];
    G.eShots = [];
    G.playing = true;

    // Limpiar pantalla
    const old = document.querySelectorAll('.enemy, .shot, .enemy-shot, .explosion');
    old.forEach(el => el.remove());

    $('gameArea').style.display = 'block';
    $('startScreen').style.display = 'none';
    $('lvlScreen').style.display = 'none';
    $('levelInd').textContent = `NIVEL ${n+1}/16`;

    createEnemies(LEVELS[n]);
    
    let lastTime = performance.now();
    function loop(now) {
        if (session !== G.currentSession || !G.playing) return;
        
        const dt = (now - lastTime) / 1000;
        lastTime = now;

        update(dt);
        G.gameLoopId = requestAnimationFrame(loop);
    }
    G.gameLoopId = requestAnimationFrame(loop);
}

function createEnemies(cfg) {
    const gap = 45;
    for(let r=0; r<cfg.rows; r++) {
        for(let c=0; c<cfg.cols; c++) {
            const e = document.createElement('div');
            e.className = 'enemy';
            e.innerHTML = (r === 0) ? '🛸' : '👾';
            e.style.position = 'fixed';
            e.style.fontSize = '1.5em';
            let x = (c * gap) + 50;
            let y = (r * gap) + 80;
            e.style.left = x + 'px';
            e.style.top = y + 'px';
            $('gameArea').appendChild(e);
            G.enemies.push({el: e, x, y, w: 30, h: 30});
        }
    }
}

let moveDir = 0;
let enemyDir = 1;

function update(dt) {
    // Movimiento jugador
    if (moveLeft) moveDir = -1;
    else if (moveRight) moveDir = 1;
    else moveDir = 0;

    G.px += moveDir * 300 * dt;
    G.px = Math.max(5, Math.min(95, G.px));
    $('player').style.left = G.px + '%';

    // Movimiento Enemigos
    let hitEdge = false;
    const speed = LEVELS[G.lvl].spd;

    G.enemies.forEach(e => {
        e.x += speed * enemyDir * dt;
        e.el.style.left = e.x + 'px';
        if (e.x > window.innerWidth - 40 || e.x < 10) hitEdge = true;
    });

    if (hitEdge) {
        enemyDir *= -1;
        G.enemies.forEach(e => {
            e.y += 20;
            e.el.style.top = e.y + 'px';
            if (e.y > window.innerHeight - 150) endGame();
        });
    }

    // Disparos
    G.shots.forEach((s, si) => {
        s.y -= 500 * dt;
        s.el.style.top = s.y + 'px';
        
        // Colisión disparo-enemigo
        G.enemies.forEach((e, ei) => {
            if (s.x > e.x && s.x < e.x + 30 && s.y > e.y && s.y < e.y + 30) {
                e.el.remove();
                G.enemies.splice(ei, 1);
                s.el.remove();
                G.shots.splice(si, 1);
                G.score += 100;
                $('score').textContent = `PUNTOS: ${G.score}`;
                if (G.enemies.length === 0) nextLevel();
            }
        });

        if (s.y < 0) {
            s.el.remove();
            G.shots.splice(si, 1);
        }
    });

    // Disparos enemigos (IA simple)
    if (Math.random() < LEVELS[G.lvl].shoot && G.enemies.length > 0) {
        const shooter = G.enemies[Math.floor(Math.random()*G.enemies.length)];
        fireEnemyShot(shooter.x + 15, shooter.y + 30);
    }

    G.eShots.forEach((s, si) => {
        s.y += 300 * dt;
        s.el.style.top = s.y + 'px';

        // Colisión con jugador
        let pRect = $('player').getBoundingClientRect();
        if (s.x > pRect.left && s.x < pRect.right && s.y > pRect.top && s.y < pRect.bottom) {
            s.el.remove();
            G.eShots.splice(si, 1);
            hitPlayer();
        }

        if (s.y > window.innerHeight) {
            s.el.remove();
            G.eShots.splice(si, 1);
        }
    });
}

function fireShot() {
    if (!G.playing) return;
    const pRect = $('player').getBoundingClientRect();
    const s = document.createElement('div');
    s.className = 'shot';
    let x = pRect.left + (pRect.width/2);
    let y = pRect.top;
    s.style.left = x + 'px';
    s.style.top = y + 'px';
    $('gameArea').appendChild(s);
    G.shots.push({el: s, x, y});
}

function fireEnemyShot(x, y) {
    const s = document.createElement('div');
    s.className = 'enemy-shot';
    s.style.left = x + 'px';
    s.style.top = y + 'px';
    $('gameArea').appendChild(s);
    G.eShots.push({el: s, x, y});
}

function hitPlayer() {
    G.lives--;
    document.body.classList.add('shake');
    setTimeout(() => document.body.classList.remove('shake'), 300);
    $('lives').textContent = `VIDAS: ${'❤️'.repeat(G.lives)}`;
    if (G.lives <= 0) endGame();
}

function nextLevel() {
    G.playing = false;
    if (G.lvl >= 15) return endGame(true);
    
    $('lvlScreen').style.display = 'flex';
    $('lvlBar').style.width = '0%';
    
    setTimeout(() => {
        $('lvlBar').style.transition = 'width 1.5s linear';
        $('lvlBar').style.width = '100%';
    }, 100);

    setTimeout(() => loadLevel(G.lvl + 1), 2000);
}

function endGame(win = false) {
    G.playing = false;
    $('gameArea').style.display = 'none';
    $('endScreen').style.display = 'flex';
    $('endTitle').textContent = win ? "¡HÉROE ESPACIAL! 🏆" : "BASE DESTRUIDA 💀";
    $('endTitle').style.color = win ? "#0f0" : "#f44";
    $('finalScore').textContent = `PUNTOS TOTALES: ${G.score}`;
}

/* --- CONTROLES --- */
let moveLeft = false;
let moveRight = false;

window.onkeydown = e => {
    if (e.key === 'ArrowLeft') moveLeft = true;
    if (e.key === 'ArrowRight') moveRight = true;
    if (e.key === ' ') fireShot();
};
window.onkeyup = e => {
    if (e.key === 'ArrowLeft') moveLeft = false;
    if (e.key === 'ArrowRight') moveRight = false;
};

// Touch para móviles
$('leftBtn').ontouchstart = () => moveLeft = true;
$('leftBtn').ontouchend = () => moveLeft = false;
$('rightBtn').ontouchstart = () => moveRight = true;
$('rightBtn').ontouchend = () => moveRight = false;
$('fireBtn').ontouchstart = (e) => { e.preventDefault(); fireShot(); };

$('startBtn').onclick = () => {
    initStars();
    loadLevel(0);
};
</script>
</body>
</html>
